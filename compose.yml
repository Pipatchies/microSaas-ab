services:
  postgres:
    image: postgres:latest
    container_name: tastyroad_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d/

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: tastyroad_api
    restart: always
    ports:
      - 8000:8000
    env_file:
      - .env
    volumes:
     - ./api/src:/usr/src/app
    depends_on:
      - postgres

volumes:
  postgres_data: