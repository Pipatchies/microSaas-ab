name: CI Pipeline

on:
  push:
  pull_request:
    branches: [develop]

jobs:
  # 🧩 Backend (Django)
  backend:
    name: Backend - Django
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Security audit
        run: pip install safety && safety check

      - name: Lint with pylint
        run: pylint .

      - name: Format check with black
        run: black --check .

      - name: Run backend tests (pytest)
        run: |
          pip install pytest pytest-django
          pytest --maxfail=1 --disable-warnings -q

      - name: Notify failure
        if: failure()
        run: echo "🚨 Build failed on ${{ github.ref_name }} — check logs in Actions tab."

  # ⚛️ Frontend (Next.js)
  frontend:
    name: Frontend - Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

      - name: Lint
        run: pnpm lint

      - name: Prettier check
        run: pnpm prettier --check .

      - name: Run frontend tests
        run: |
          pnpm test || echo "⚠️ No tests found, skipping..."

      - name: Build Next.js
        run: pnpm build

      - name: Notify failure
        if: failure()
        run: echo "🚨 Build failed on ${{ github.ref_name }} — check logs in Actions tab."


  # 🐳 Docker build validation
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -t tastyroad-backend -f api/Dockerfile api

      - name: Build frontend Docker image
        run: |
          docker build -t tastyroad-frontend -f client/Dockerfile client

