name: 🛡️ CI Checks

on:
  push:
    branches: [develop, 'feature/*'] # Run on develop and feature branches
  pull_request:
    types: [opened, synchronize, reopened] # Run on all PRs

jobs:
  # 🧩 Backend (Django) Checks
  backend-checks:
    name: Backend - Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety pytest pytest-django pylint black

      - name: Security audit (safety)
        run: safety check

      - name: Lint (pylint)
        run: pylint .

      - name: Format check (black)
        run: black --check .

      - name: Run tests (pytest)
        run: pytest --maxfail=1 --disable-warnings -q

  # ⚛️ Frontend (Next.js) Checks
  frontend-checks:
    name: Frontend - Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Prettier check
        run: pnpm prettier --check .

      - name: Run tests (Vitest)
        run: pnpm test
