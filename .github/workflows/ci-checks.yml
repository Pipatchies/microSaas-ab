name: 🛡️ CI Checks

on:
  push:
    branches: [develop, "feature/*"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:

jobs:
  backend-checks:
    name: Backend - Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov pip-audit ruff

      - name: Security audit (pip-audit)
        run: pip-audit

      - name: Linting check (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Run tests with coverage (pytest)
        run: pytest --cov=src --cov-report=term-missing --disable-warnings -q

  # ⚛️ Frontend (Next.js) Checks
  frontend-checks:
    name: Frontend - Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Prettier check
        run: pnpm prettier --check .

      - name: Run tests (Vitest)
        run: pnpm test
