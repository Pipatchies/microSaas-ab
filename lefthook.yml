pre-commit:
  parallel: true
  commands:
    frontend-lint:
      root: "client"
      run: pnpm lint
    frontend-format:
      root: "client"
      run: pnpm prettier --check .
    # backend-lint:
    #   root: "api/src"
    #   run: |
    #     if [ -f "./env/Scripts/python.exe" ]; then
    #       ./env/Scripts/python.exe -m pylint .
    #     else
    #       python -m pylint .
    #     fi
    # backend-format:
    #   root: "api/src"
    #   run: python -m black --check .

commit-msg:
  commands:
    lint-commit:
      run: npx commitlint --edit "$1"

pre-push:
  parallel: true
  commands:
    audit-frontend:
      root: "client"
      run: pnpm audit
    audit-backend:
      root: "api/src"
      run: |
        if [ -f "./env/Scripts/python.exe" ]; then
          ./env/Scripts/python.exe -m pip_audit
        else
          python -m pip_audit
        fi
