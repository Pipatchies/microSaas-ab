pre-commit:
  parallel: true
  commands:
    frontend-format:
      glob: "client/**/*.{js,ts,jsx,tsx,json,css,md}"
      run: pnpm --filter tastyroad exec prettier --write {staged_files}
      stage_fixed: true

    frontend-lint:
      glob: "client/**/*.{js,ts,jsx,tsx}"
      run: pnpm --filter tastyroad exec eslint --fix {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    lint-commit:
      run: npx commitlint --edit "$1"

pre-push:
  parallel: true
  commands:
    # Pour l'audit, on garde la vérification globale car c'est rapide et important de tout checker avant push
    audit-frontend:
      root: "client"
      run: pnpm audit
